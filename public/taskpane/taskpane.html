<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xero Excel Add-in</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      body { font-family: Arial, sans-serif; padding: 16px; }
      select {
        width: 100%;
        padding: 8px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }
      button {
        display: block;
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        background-color: #1a73e8;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover { background-color: #1558b0; }
      button#btn-switch { background-color: #34a853; }
      button#btn-switch:hover { background-color: #2d8f47; }
      button#btn-connect { background-color: #1a73e8; }
      button#btn-logout { background-color: #ea4335; width: auto; font-size: 12px; padding: 6px 12px; float: right; }
      #status { margin-top: 16px; font-size: 13px; color: #555; }
      #current-org { font-size: 13px; font-weight: bold; color: #1a73e8; margin-bottom: 8px; }
      #login-screen { text-align: center; padding: 20px 0; }
      #login-screen img { width: 80px; margin-bottom: 16px; }
      #login-screen h2 { color: #1a73e8; margin-bottom: 8px; }
      #login-screen p { font-size: 13px; color: #555; margin-bottom: 16px; }
      #login-screen input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
      }
      #login-error { color: #ea4335; font-size: 13px; margin-top: 8px; display: none; }
      #main-screen { display: none; }

      /* Modal */
      #date-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      #date-modal.open { display: flex; }
      #date-modal-box {
        background: white;
        border-radius: 8px;
        padding: 20px;
        width: 280px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      }
      #date-modal-box h3 { margin: 0 0 12px; font-size: 15px; color: #333; }
      #date-modal-box label { font-size: 12px; color: #555; display: block; margin-top: 10px; }
      #date-modal-box input[type="month"] {
        width: 100%;
        padding: 7px;
        margin-top: 4px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        box-sizing: border-box;
      }
      #date-modal-box .quick-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
      #date-modal-box .quick-btns button {
        flex: 1;
        padding: 6px 4px;
        font-size: 11px;
        margin: 0;
        background: #f1f3f4;
        color: #333;
        border: 1px solid #ccc;
      }
      #date-modal-box .quick-btns button:hover { background: #e2e6ea; }
      #date-modal-actions { display: flex; gap: 8px; margin-top: 16px; }
      #date-modal-actions button { margin: 0; flex: 1; }
      #btn-modal-cancel { background: #ccc; color: #333; }
      #btn-modal-cancel:hover { background: #bbb; }
    </style>
  </head>
  <body>

    <!-- Login Screen -->
    <div id="login-screen">
      <img src="../../assets/icon-80.png" />
      <h2>Xero Excel Add-in</h2>
      <p>Enter your access code to continue</p>
      <input type="password" id="access-code" placeholder="Access code" />
      <button id="btn-login">Login</button>
      <p id="login-error">Incorrect access code. Please try again.</p>
    </div>

    <!-- Main Screen -->
    <div id="main-screen">
      <img src="../../assets/icon-80.png" style="width: 40px; float: left; margin-right: 8px;" />
      <button id="btn-logout">Logout</button>
      <div style="clear:both; margin-bottom: 8px;"></div>
      <p id="current-org">Loading organisations...</p>
      <select id="org-select"></select>
      <button id="btn-switch">Switch Organisation</button>
      <button id="btn-connect">+ Connect New Organisation</button>
      <hr/>
      <button id="btn-reconnect" style="background-color: #00B4E6;">↺ Reconnect to Xero</button>
      <button id="btn-accounts">Load Chart of Accounts</button>
      <button id="btn-rollingtrialbalance">Load Rolling Trial Balance</button>
      <p id="status">Click a button to load data into Excel.</p>
    </div>

    <!-- Date Range Modal -->
    <div id="date-modal">
      <div id="date-modal-box">
        <h3>Rolling Trial Balance</h3>
        <div class="quick-btns">
          <button onclick="setQuickRange(12)">12 months</button>
          <button onclick="setQuickRange(24)">24 months</button>
          <button onclick="setQuickRange(36)">36 months</button>
          <button onclick="setQuickRange(48)">48 months</button>
        </div>
        <label>From</label>
        <input type="month" id="date-from" />
        <label>To</label>
        <input type="month" id="date-to" />
        <div id="date-modal-actions">
          <button id="btn-modal-cancel">Cancel</button>
          <button id="btn-modal-load">Load Data</button>
        </div>
      </div>
    </div>

    <script src="taskpane.js"></script>
  </body>
</html>
